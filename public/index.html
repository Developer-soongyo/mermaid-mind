<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MermaidMind</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <span>&#9670;</span> MermaidMind
  </div>

  <!-- Settings -->
  <div class="settings-toggle" onclick="toggleSettings()">
    &#9881; Settings <span id="settings-arrow">&#9654;</span>
  </div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-field">
      <label>API Key <span class="source-badge" id="badge-key"></span></label>
      <input type="password" id="set-api-key" placeholder="Azure OpenAI key" />
    </div>
    <div class="settings-field">
      <label>Endpoint <span class="source-badge" id="badge-endpoint"></span></label>
      <input type="text" id="set-endpoint" placeholder="https://your-resource.openai.azure.com" />
    </div>
    <div class="settings-field">
      <label>API Version <span class="source-badge" id="badge-version"></span></label>
      <input type="text" id="set-api-version" placeholder="2024-02-01" />
    </div>
    <div class="settings-field">
      <label>Deployment <span class="source-badge" id="badge-deployment"></span></label>
      <input type="text" id="set-deployment" placeholder="gpt-4o" />
    </div>
    <div class="settings-btns">
      <button class="btn-test" onclick="testConnection()">Test</button>
      <button class="btn-save-settings" onclick="saveSettings()">Save</button>
    </div>
    <div class="settings-status" id="settingsStatus"></div>
  </div>

  <!-- History -->
  <div class="history-header">Diagrams</div>
  <div style="padding:0 8px 8px;">
    <input type="text" id="historySearch" placeholder="Search diagrams..."
      oninput="filterHistory()"
      style="width:100%;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;outline:none;" />
  </div>
  <div class="tag-filter-wrap" id="tagFilterWrap">
    <div class="tag-filter-bar" id="tagFilterBar"></div>
  </div>
  <div class="history-list" id="historyList"></div>
</aside>

<div class="resize-handle" id="sidebarHandle"></div>

<!-- Main -->
<main class="main">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-title">&#128196; Code</div>
    <button class="btn btn-secondary" onclick="copyCode()" id="copyCodeBtn" style="font-size:11px;padding:4px 10px;">&#128203; Copy</button>
    <div class="auto-update-toggle">
      Auto-Update
      <label class="toggle-switch">
        <input type="checkbox" id="autoUpdate" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>
    <button class="btn btn-primary" onclick="renderPreview(editor.value)" style="font-size:11px;padding:4px 10px;">&#9654; Render</button>
    <button class="btn btn-secondary" onclick="toggleAppTheme()" id="themeToggleBtn" style="font-size:11px;padding:4px 10px;">&#9790; Dark</button>
  </div>

  <!-- Workspace -->
  <div class="workspace">
    <!-- Editor -->
    <div class="editor-pane">
      <div class="editor-wrap">
        <div class="line-numbers" id="lineNumbers">1</div>
        <textarea class="code-textarea" id="codeEditor" spellcheck="false"
          placeholder="Type your Mermaid diagram code here..."></textarea>
      </div>
      <div class="editor-bottom">
        <button class="btn btn-ai" onclick="toggleAIPrompt()">&#10022; Generate</button>
        <button class="btn btn-ai-action" onclick="openAIAction('theme')" title="AI Theme/Color">&#127912; Theme</button>
        <button class="btn btn-ai-action" onclick="runAIAction('fix')" title="AI Fix & Improve">&#128295; Fix</button>
        <button class="btn btn-ai-action" onclick="runAIAction('explain')" title="AI Explain">&#128172; Explain</button>
        <button class="btn btn-ai-action" onclick="openAIAction('expand')" title="AI Expand">&#128300; Expand</button>
        <div class="snippets-wrap">
          <button class="btn btn-secondary" onclick="toggleSnippets()">&#9671; Snippets</button>
          <div class="snippets-menu" id="snippetsMenu"></div>
        </div>
        <div class="ai-prompt-wrap" id="aiPromptWrap">
          <input class="ai-prompt-input" id="aiPromptInput"
            placeholder="Describe your diagram..." />
          <button class="btn btn-primary" id="aiGenerateBtn" onclick="generateFromAI()">Generate</button>
        </div>
      </div>
    </div>

    <div class="resize-handle" id="editorHandle"></div>

    <!-- Preview -->
    <div class="preview-pane">
      <div class="preview-toolbar">
        <button class="btn-icon" onclick="zoomAtPoint(0.8, window.innerWidth*0.75, window.innerHeight/2)" title="Zoom out">&#8722;</button>
        <button class="btn-icon" onclick="zoomAtPoint(1.25, window.innerWidth*0.75, window.innerHeight/2)" title="Zoom in">&#43;</button>
        <button class="btn-icon" onclick="fitToScreen()" title="Fit to screen">&#9635;</button>
        <button class="btn-icon" onclick="resetZoom()" title="Reset (100%)">1:1</button>
        <span class="spacer"></span>
        <button class="btn btn-secondary" onclick="enterPresentation()" title="Presentation mode">&#9654; Present</button>
        <div class="export-wrap">
          <button class="btn btn-secondary" onclick="toggleExport()">&#8615; Export</button>
          <div class="export-menu" id="exportMenu">
            <div class="export-item" onclick="exportClipboard()">Copy to Clipboard</div>
            <div class="export-item" onclick="exportSVG()">SVG</div>
            <div class="export-item" onclick="exportPNG()">PNG</div>
            <div class="export-item" onclick="exportPDF()">PDF</div>
          </div>
        </div>
      </div>
      <div class="preview-area" id="previewArea">
        <div class="preview-canvas" id="previewCanvas">
          <span class="preview-placeholder">Preview will appear here</span>
        </div>
        <div class="zoom-indicator" id="zoomIndicator">100%</div>
      </div>
    </div>
  </div>

  <!-- Save bar -->
  <div class="save-bar">
    <button class="btn btn-secondary" onclick="newDiagram()">&#43; New</button>
    <span id="diagramNameDisplay" ondblclick="startRenameCurrentDiagram()" title="Double-click to rename" style="flex:1;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></span>
    <button class="btn btn-primary" onclick="saveDiagram()">Save</button>
    <button class="btn btn-secondary" onclick="saveVersion()">Save Version</button>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<!-- AI Action Prompt Modal -->
<div class="ai-modal-overlay" id="aiModalOverlay" onclick="if(event.target===this)closeAIModal()">
  <div class="ai-modal">
    <h3 id="aiModalTitle">AI Action</h3>
    <p id="aiModalDesc">Describe what you want.</p>
    <input type="text" id="aiModalInput" placeholder="e.g. corporate blue theme..." />
    <div class="ai-modal-btns">
      <button class="btn btn-secondary" onclick="closeAIModal()">Cancel</button>
      <button class="btn btn-primary" id="aiModalSubmit" onclick="submitAIModal()">Apply</button>
    </div>
  </div>
</div>

<!-- AI Explain Modal -->
<div class="explain-overlay" id="explainOverlay" onclick="if(event.target===this)closeExplain()">
  <div class="explain-modal">
    <h3>&#128172; Diagram Explanation</h3>
    <div class="explain-content" id="explainContent"></div>
    <div class="explain-close">
      <button class="btn btn-secondary" onclick="closeExplain()">Close</button>
    </div>
  </div>
</div>

<!-- Presentation Mode Overlay -->
<div class="presentation-overlay" id="presentationOverlay">
  <div class="presentation-topbar">
    <span class="diagram-title" id="presentationTitle"></span>
    <span class="spacer"></span>
    <button class="btn-icon" onclick="presZoomAt(0.8)" title="Zoom out" style="color:var(--text2);font-size:16px;">&#8722;</button>
    <button class="btn-icon" onclick="presZoomAt(1.25)" title="Zoom in" style="color:var(--text2);font-size:16px;">&#43;</button>
    <button class="btn-icon" onclick="presFit()" title="Fit" style="color:var(--text2);font-size:16px;">&#9635;</button>
    <button class="btn-icon" onclick="presReset()" title="Reset" style="color:var(--text2);font-size:14px;">1:1</button>
    <div class="export-wrap">
      <button class="btn btn-secondary" onclick="togglePresExport()">&#8615; Export</button>
      <div class="export-menu" id="presExportMenu">
        <div class="export-item" onclick="exportClipboard();togglePresExport()">Copy to Clipboard</div>
        <div class="export-item" onclick="exportSVG();togglePresExport()">SVG</div>
        <div class="export-item" onclick="exportPNG();togglePresExport()">PNG</div>
        <div class="export-item" onclick="exportPDF();togglePresExport()">PDF</div>
      </div>
    </div>
    <button class="btn btn-secondary" onclick="exitPresentation()" style="margin-left:8px;">&#10005; Exit</button>
  </div>
  <div class="presentation-canvas-wrap" id="presCanvasWrap">
    <div class="presentation-canvas" id="presCanvas"></div>
    <div class="presentation-zoom-indicator" id="presZoomIndicator">100%</div>
    <div class="presentation-hint">Esc to exit &middot; Scroll to zoom &middot; Drag to pan</div>
  </div>
</div>

<!-- JavaScript (loaded in dependency order) -->
<script src="js/config.js"></script>
<script src="js/settings.js"></script>
<script src="js/editor.js"></script>
<script src="js/preview.js"></script>
<script src="js/theme.js"></script>
<script src="js/snippets.js"></script>
<script src="js/history.js"></script>
<script src="js/save.js"></script>
<script src="js/export.js"></script>
<script src="js/ai.js"></script>
<script src="js/presentation.js"></script>
<script src="js/resize.js"></script>
<script src="js/init.js"></script>
</body>
</html>
